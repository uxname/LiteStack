name: CI

# Meta-repo CI. The meta-repo owns no application code — it pins two submodules. This
# workflow checks out the pinned commits (which validates the submodule pointers resolve)
# and runs each submodule's own quality gate (`npm run check`). A broken pointer or a
# submodule that fails its gate fails the build.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  submodule-check:
    name: ${{ matrix.project }} — npm run check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [backend, frontend]
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Quality gate
        working-directory: ${{ matrix.project }}
        run: npm run check
