name: CI

# Meta-repo CI. The meta-repo owns no application code — it pins two submodules. This
# workflow checks out the pinned commits (which validates the submodule pointers resolve)
# and runs each submodule's own quality gate AND its test safety net. A broken pointer, a
# failing gate, a coverage drop, or a failing test/E2E fails the build. The test safety net
# (coverage gates + E2E) runs here, in CI — not only in the bypassable local pre-push hook —
# so it cannot be skipped with `git push --no-verify`. The two submodules use different
# stacks, so each has its own job: the backend (liteend-go) is Go + `task`; the frontend
# (litefront) is Node + npm.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: backend — check + tests + coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Dev tools (sqlc, gqlgen, golangci-lint, gofumpt, govulncheck) are pinned in the
      # `tool` block of go.mod and invoked via `go tool` — no separate install needed.
      # `task check` is Docker-free: gen:check, tidy:check, fmt:check, build, lint, arch,
      # deadcode, vuln, secrets.
      - name: Quality gate
        working-directory: backend
        run: task check

      # `task test:cov` runs unit + integration tests (testcontainers → Postgres/Redis,
      # needs Docker — preinstalled on ubuntu-latest) and enforces the coverage thresholds
      # in .testcoverage.yml (total + per-package floors). This is the backend's test
      # safety net, now non-bypassable in CI.
      - name: Tests + coverage gate
        working-directory: backend
        run: task test:cov

  frontend:
    name: frontend — check + unit/coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      # Quality gate: biome, ts, knip (dead code), steiger (FSD boundaries), stylelint,
      # and the component-trio check (every shared/ui component ships a story + test).
      - name: Quality gate
        working-directory: frontend
        run: npm run check

      # Unit/component tests + the Vitest coverage thresholds (vite.config.ts). The test
      # safety net, enforced in CI rather than only in the pre-push hook.
      - name: Tests + coverage gate
        working-directory: frontend
        run: npm run test:cov

      # Storybook (Ladle) build gate: the Ladle config has its own Vite config that
      # is easy to break silently (plugin/version drift, missing styles). A build is
      # cheap (~seconds) and fails fast if stories or the config regress.
      - name: Storybook build gate
        working-directory: frontend
        run: npm run storybook:build

  frontend-e2e:
    name: frontend — e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      # The E2E suite mocks GraphQL (page.route) and uses mock auth (VITE_MOCK_AUTH=true,
      # set by the Playwright webServer command), so it needs NO backend — only a built
      # SPA. A .env (copied from the committed example) satisfies the build's env contract.
      - name: Seed .env for the build
        working-directory: frontend
        run: cp .env.example .env

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: E2E (chromium)
        working-directory: frontend
        run: npm run test:e2e:prod
