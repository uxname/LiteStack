name: CI

# Meta-repo CI. The meta-repo owns no application code — it pins two submodules. This
# workflow checks out the pinned commits (which validates the submodule pointers resolve)
# and runs each submodule's own quality gate. A broken pointer or a submodule that fails
# its gate fails the build. The two submodules use different stacks, so each has its own
# job: the backend (liteend-go) is Go + `task`; the frontend (litefront) is Node + npm.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: backend — task check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Dev tools (sqlc, gqlgen, golangci-lint, gofumpt, govulncheck) are pinned in the
      # `tool` block of go.mod and invoked via `go tool` — no separate install needed.
      # `task check` is Docker-free: gen:check, tidy:check, fmt:check, build, lint, vuln,
      # secrets. (`task test:all` needs testcontainers/Docker and is left to pre-push.)
      - name: Quality gate
        working-directory: backend
        run: task check

      - name: Unit tests
        working-directory: backend
        run: task test

  frontend:
    name: frontend — npm run check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Quality gate
        working-directory: frontend
        run: npm run check
